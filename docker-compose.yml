version: '3.8'

services:
  # Nginx 反向代理服务
  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    ports:
      - "80:8000"    # 后端 API 通过 80 端口访问
      - "3000:3000"  # 前端通过 3000 端口访问
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - portfolio_network
    restart: unless-stopped

  # Redis (为应用提供缓存支持)
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - portfolio_network
    restart: unless-stopped

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_backend
    # 通过 Nginx 代理，不直接暴露
    expose:
      - "8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - DEV_MODE=true
      - DATA_DIR=/app/data
    volumes:
      - ./backend/data:/app/data
      - ./backend/static:/app/static
    depends_on:
      - redis
    networks:
      - portfolio_network
    restart: unless-stopped

  # 前端服务 (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio_frontend
    # 通过 Nginx 代理，不直接暴露
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost
    depends_on:
      - backend
    networks:
      - portfolio_network
    restart: unless-stopped

volumes:
  redis_data:
    driver: local

networks:
  portfolio_network:
    driver: bridge